# ==============================================================================
# FONT CONFIGURATION
# ==============================================================================
font_family      Monospace Regular
bold_font        Monospace Bold
italic_font      Monospace Italic
bold_italic_font Monospace Bold Italic
font_size        11.0

# ==============================================================================
# WINDOW & PADDING (Mirrored from your 80x24 Alacritty setup)
# ==============================================================================
remember_window_size  no
initial_window_width  80c
initial_window_height 26c
window_padding_width  4
background_opacity    0.9

# ==============================================================================
# CURSOR
# ==============================================================================
cursor_shape          beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# ==============================================================================
# SHELL (Loads your custom Starship/Zsh setup perfectly)
# ==============================================================================
shell /bin/zsh --login

# ==============================================================================
# SCROLLBACK HISTORY
# ==============================================================================
scrollback_lines 10000

# ==============================================================================
# DRACULA COLOR THEME INTEGRATION
# ==============================================================================
foreground            #f8f8f2
background            #282a36
selection_foreground  #ffffff
selection_background  #44475a

url_color #8be9fd

# Black
color0  #21222c
color8  #6272a4
# Red
color1  #ff5555
color9  #ff6e6e
# Green
color2  #50fa7b
color10 #69ff94
# Yellow
color3  #f1fa8c
color11 #ffffa5
# Blue
color4  #bd93f9
color12 #d6acff
# Magenta
color5  #ff79c6
color13 #ff92df
# Cyan
color6  #8be9fd
color14 #a4ffff
# White
color7  #f8f8f2
color15 #ffffff
